<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smeigedager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Chewy&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <p class="page-title">Smeigedag = Sørlandsuttrykk for fine, klare dager<br />med sol og minst 18 grader</p>
      <form id="search-form" class="question-shell" autocomplete="off">
        <label class="question-label" for="search-input">Hvor mange smeigedager var det i</label>
        <div class="question-row">
          <input id="search-input" name="query" type="search" list="city-options" placeholder="Oslo?" required />
          <button type="submit" class="ask-button">Se svar</button>
        </div>
        <datalist id="city-options"></datalist>
      </form>

      <section id="answer" class="answer" aria-live="polite">
        <p id="answer-text" class="answer-text">Skriv inn et sted for a finne antall smeigedager i 2025.</p>
        <p id="answer-meta" class="answer-meta">En smeigedag = Makstemperatur over 18 grader og 0 mm nedbor.</p>
      </section>
    </main>

    <p class="footnote">Data fra Meteorologisk institutt</p>

    <script src="./config.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
